    <animate attributeName="y" values="426;396;416;402;426" dur="1.4s" repeatCount="indefinite"/>
  </rect>
  <rect x="710" y="396" width="16" height="48" rx="8" fill="#64D2FF">
    <animate attributeName="height" values="44;22;56;30;44" dur="1.7s" repeatCount="indefinite"/>
    <animate attributeName="y" values="400;422;388;414;400" dur="1.7s" repeatCount="indefinite"/>
  </rect>
  <rect x="738" y="416" width="16" height="28" rx="8" fill="#8338EC">
    <animate attributeName="height" values="20;52;24;44;20" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="424;392;420;400;424" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <text x="782" y="433" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="900">Mic + System</text>
  <rect x="912" y="328" width="230" height="134" rx="26" fill="#111827" stroke="#263B5D"/>
  <text x="944" y="378" fill="#FFD166" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">CAMERA</text>
  <rect x="944" y="402" width="72" height="48" rx="14" fill="#0A84FF"/>
  <circle cx="980" cy="426" r="14" fill="#FFFFFF"/>
  <text x="1030" y="433" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="900">Overlay</text>
  <rect x="388" y="496" width="752" height="134" rx="30" fill="#101A32" stroke="#263B5D"/>
  <text x="430" y="552" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="900">Built for creators, teachers, support teams, and builders.</text>
  <text x="430" y="592" fill="#9CA3AF" font-family="Segoe UI, Arial, sans-serif" font-size="20">No account. No upload. No telemetry. Your recording stays yours.</text>
  <circle cx="1086" cy="564" r="22" fill="#FF3B30">
    <animate attributeName="opacity" values="1;0.28;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <text x="1060" y="604" fill="#FFB4AE" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">REC</text>
  <rect x="-220" y="54" width="130" height="612" fill="#FFFFFF" opacity="0.08" transform="skewX(-18)">
    <animate attributeName="x" values="-220;1380" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
