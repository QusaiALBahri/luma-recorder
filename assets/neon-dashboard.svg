  <text x="229" y="322" text-anchor="middle" fill="#9CA3AF" font-family="Segoe UI, Arial, sans-serif" font-size="18">Recorder by albahri.org</text>
  <rect x="142" y="360" width="174" height="38" rx="19" fill="#0A84FF"/>
  <text x="229" y="385" text-anchor="middle" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">LOCAL-FIRST</text>
  <rect x="142" y="414" width="174" height="38" rx="19" fill="#15233C"/>
  <text x="229" y="439" text-anchor="middle" fill="#64D2FF" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">PORTABLE EXE</text>
  <rect x="142" y="468" width="174" height="38" rx="19" fill="#15233C"/>
  <text x="229" y="493" text-anchor="middle" fill="#34C759" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">AR + EN UI</text>
  <rect x="388" y="90" width="752" height="210" rx="30" fill="#101A32" stroke="#263B5D"/>
  <text x="430" y="156" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="50" font-weight="900">Record. Explain. Ship.</text>
  <text x="432" y="202" fill="#C7D2FE" font-family="Segoe UI, Arial, sans-serif" font-size="22">Screen + microphone + webcam + quick polish, without leaving your machine.</text>
  <rect x="432" y="236" width="130" height="36" rx="18" fill="#0A84FF"/>
  <text x="497" y="260" text-anchor="middle" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">Download</text>
