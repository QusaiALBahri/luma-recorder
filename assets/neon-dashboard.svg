<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816"/>
      <stop offset="0.48" stop-color="#10162F"/>
      <stop offset="1" stop-color="#031D19"/>
    </linearGradient>
    <linearGradient id="neon" x1="124" y1="116" x2="1166" y2="604" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A84FF"/>
      <stop offset="0.45" stop-color="#8338EC"/>
      <stop offset="0.72" stop-color="#64D2FF"/>
      <stop offset="1" stop-color="#34C759"/>
    </linearGradient>
    <filter id="blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="202" cy="160" r="130" fill="#0A84FF" opacity="0.22" filter="url(#blur)">
    <animate attributeName="cx" values="202;250;202" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1090" cy="570" r="160" fill="#34C759" opacity="0.18" filter="url(#blur)">
    <animate attributeName="cy" values="570;510;570" dur="7s" repeatCount="indefinite"/>
  </circle>
  <rect x="70" y="54" width="1140" height="612" rx="34" fill="#0C1224" opacity="0.94" stroke="#23324D" stroke-width="2"/>
  <rect x="104" y="90" width="250" height="540" rx="28" fill="#111827" stroke="#263B5D"/>
  <circle cx="229" cy="178" r="66" fill="url(#neon)" filter="url(#glow)">
    <animate attributeName="r" values="61;70;61" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="229" cy="178" r="44" fill="#0C1224"/>
