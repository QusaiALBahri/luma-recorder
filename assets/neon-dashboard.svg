  <text x="785" y="260" text-anchor="middle" fill="#34C759" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">Contribute</text>
  <rect x="388" y="328" width="230" height="134" rx="26" fill="#111827" stroke="#263B5D"/>
  <text x="420" y="378" fill="#64D2FF" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">SCREEN</text>
  <text x="420" y="416" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="900">Area / Full</text>
  <rect x="420" y="434" width="150" height="8" rx="4" fill="#0A84FF">
    <animate attributeName="width" values="70;150;110;150" dur="4s" repeatCount="indefinite"/>
